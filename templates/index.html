<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Scraper</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script>tailwind = { darkMode: 'media', theme: { extend: { fontFamily: { mono: ['JetBrains Mono', 'ui-monospace', 'monospace'] } } } }</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.3/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        [x-cloak]{display:none!important}
        .input{@apply w-full bg-transparent border border-zinc-200 dark:border-zinc-800 rounded px-3 py-2 text-xs outline-none focus:border-zinc-400 dark:focus:border-zinc-600 placeholder-zinc-300 dark:placeholder-zinc-700}
        .btn{@apply px-3 py-1.5 text-xs font-medium border border-zinc-200 dark:border-zinc-800 rounded hover:bg-zinc-50 dark:hover:bg-zinc-900 text-zinc-500}
    </style>
</head>
<body class="font-mono bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 h-screen flex overflow-hidden"
    x-data="app()" x-init="init()">

<div x-show="sidebarOpen && isMobile" x-cloak @click="sidebarOpen = false" class="fixed inset-0 bg-black/40 z-20"></div>

<aside id="sidebar" class="shrink-0 border-r border-zinc-200 dark:border-zinc-800 flex flex-col h-full bg-white dark:bg-zinc-950 overflow-hidden"
    :class="isMobile
        ? (sidebarOpen ? 'fixed inset-y-0 left-0 z-30 w-52' : 'fixed -translate-x-full inset-y-0 left-0 z-30 w-52')
        : (sidebarOpen ? 'w-52' : 'w-12')">

    <div class="h-14 flex items-center border-b border-zinc-200 dark:border-zinc-800 shrink-0" :class="sidebarOpen ? 'px-3' : 'justify-center'">
        <div class="flex items-center gap-2.5">
            <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none">
                <path d="M12 2C8.686 2 6 4.686 6 8c0 4.418 6 12 6 12s6-7.582 6-12c0-3.314-2.686-6-6-6z" fill="currentColor"/>
                <circle cx="12" cy="8" r="2.25" fill="white"/>
            </svg>
            <span x-show="sidebarOpen" x-cloak class="text-sm font-bold tracking-tight whitespace-nowrap">Lead Scraper</span>
        </div>
    </div>

    <nav class="flex flex-col gap-0.5 p-2 flex-1">
        <button @click="tab = 'dashboard'; if (isMobile) sidebarOpen = false"
            :class="tab === 'dashboard' ? 'bg-zinc-100 dark:bg-zinc-800 text-zinc-900 dark:text-zinc-100' : 'text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100'"
            class="flex items-center gap-2.5 px-2.5 py-2.5 rounded text-xs font-medium text-left">
            <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7h18M3 12h18M3 17h18"/></svg>
            <span x-show="sidebarOpen" x-cloak>Dashboard</span>
        </button>
        <button @click="tab = 'config'; if (isMobile) sidebarOpen = false"
            :class="tab === 'config' ? 'bg-zinc-100 dark:bg-zinc-800 text-zinc-900 dark:text-zinc-100' : 'text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100'"
            class="flex items-center gap-2.5 px-2.5 py-2.5 rounded text-xs font-medium text-left">
            <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
            <span x-show="sidebarOpen" x-cloak>Settings</span>
        </button>
    </nav>

    <div class="p-2 border-t border-zinc-200 dark:border-zinc-800 space-y-1">
        <div class="flex items-center gap-2.5 px-2.5 py-2">
            <div class="w-1.5 h-1.5 rounded-full" :class="running ? 'bg-emerald-500 animate-pulse' : 'bg-zinc-300 dark:bg-zinc-700'"></div>
            <span x-show="sidebarOpen" x-cloak class="text-xs text-zinc-500" x-text="running ? 'Running' : 'Idle'"></span>
            <span x-show="sidebarOpen" x-cloak class="ml-auto text-xs font-medium" x-text="leads.length"></span>
        </div>
        <button @click="sidebarOpen = !sidebarOpen" x-show="!isMobile"
            class="w-full flex items-center gap-2.5 px-2.5 py-2 rounded text-xs text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100">
            <svg class="w-4 h-4 shrink-0" :class="sidebarOpen ? '' : 'rotate-180'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 19l-7-7 7-7M19 19l-7-7 7-7"/></svg>
            <span x-show="sidebarOpen" x-cloak>Collapse</span>
        </button>
    </div>
</aside>

<div class="flex flex-col flex-1 overflow-hidden min-w-0">

    <div x-show="tab === 'dashboard'" x-cloak class="flex flex-col flex-1 overflow-hidden">
        <div class="border-b border-zinc-200 dark:border-zinc-800 flex flex-wrap items-center gap-2 px-4 py-2 shrink-0">
            <button @click="sidebarOpen = true" x-show="isMobile" aria-label="Open menu" class="p-1.5 rounded text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <button @click="control('start')" x-show="!running"
                class="px-3 py-1.5 text-xs font-medium bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 rounded hover:opacity-80">Start</button>
            <button @click="control('stop')" x-show="running" class="btn">Stop</button>
            <button @click="exportCsv()" class="btn">Export</button>
            <button @click="showClearConfirm = !showClearConfirm" class="btn">Clear</button>
            <div x-show="showClearConfirm" x-cloak class="flex items-center gap-2">
                <span class="text-xs text-zinc-500">Delete all?</span>
                <button @click="control('clear'); showClearConfirm = false" class="px-2 py-1 text-xs font-medium text-red-600 border border-red-200 dark:border-red-800 rounded">Yes</button>
                <button @click="showClearConfirm = false" class="px-2 py-1 text-xs text-zinc-500 border border-zinc-200 dark:border-zinc-700 rounded">No</button>
            </div>
            <input type="text" x-model="search" placeholder="Filter..." aria-label="Filter leads"
                class="ml-auto bg-transparent border border-zinc-200 dark:border-zinc-800 rounded px-3 py-1.5 text-xs outline-none focus:border-zinc-400 dark:focus:border-zinc-600 w-28 sm:w-48 placeholder-zinc-400">
        </div>

        <div class="flex-1 overflow-auto min-h-0">
            <table class="w-full text-xs border-collapse min-w-[600px]">
                <thead class="sticky top-0 bg-white dark:bg-zinc-950 border-b border-zinc-200 dark:border-zinc-800 z-10">
                    <tr class="text-zinc-400 dark:text-zinc-600 uppercase text-[10px] tracking-wider">
                        <th class="text-left px-4 py-2.5 font-medium">Company</th>
                        <th class="text-left px-4 py-2.5 font-medium">Email</th>
                        <th class="text-left px-4 py-2.5 font-medium">Phone</th>
                        <th class="text-left px-4 py-2.5 font-medium">Category</th>
                        <th class="text-left px-4 py-2.5 font-medium">Rating</th>
                        <th class="text-right px-4 py-2.5 font-medium">Links</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-zinc-100 dark:divide-zinc-900">
                    <template x-for="lead in filteredLeads" :key="lead['Maps URL']">
                        <tr class="hover:bg-zinc-50 dark:hover:bg-zinc-900/50">
                            <td class="px-4 py-2.5">
                                <div class="font-medium truncate max-w-[180px]" x-text="lead.Company"></div>
                                <div class="text-zinc-400 text-[10px] truncate max-w-[180px]" x-text="lead.Address"></div>
                            </td>
                            <td class="px-4 py-2.5">
                                <a x-show="lead.Email" :href="'mailto:' + lead.Email" class="text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 truncate block max-w-[160px]" x-text="lead.Email"></a>
                            </td>
                            <td class="px-4 py-2.5 text-zinc-500 whitespace-nowrap" x-text="lead.Phone"></td>
                            <td class="px-4 py-2.5 text-zinc-500 truncate max-w-[120px]" x-text="lead.Category"></td>
                            <td class="px-4 py-2.5 whitespace-nowrap text-zinc-500">
                                <span x-show="lead.Rating"><span x-text="lead.Rating"></span> <span class="text-zinc-400" x-text="lead.Reviews ? '(' + lead.Reviews + ')' : ''"></span></span>
                            </td>
                            <td class="px-4 py-2.5 text-right whitespace-nowrap">
                                <a :href="lead.Website" target="_blank" x-show="lead.Website" aria-label="Website" class="inline-block text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 mr-2">↗</a>
                                <a :href="lead['Maps URL']" target="_blank" x-show="lead['Maps URL']" aria-label="Maps" class="inline-block text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100">📍</a>
                            </td>
                        </tr>
                    </template>
                    <tr x-show="filteredLeads.length === 0">
                        <td colspan="6" class="px-4 py-12 text-center text-zinc-400 text-xs"
                            x-text="search ? 'No results match your filter.' : 'No leads yet. Start the scraper to begin.'"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div :style="'height:' + logHeight + 'px'" class="border-t border-zinc-200 dark:border-zinc-800 shrink-0 flex flex-col" style="min-height:60px;max-height:70vh">
            <div @mousedown="startResize($event)" @touchstart.passive="startResize($event)" class="h-1.5 cursor-ns-resize hover:bg-zinc-200 dark:hover:bg-zinc-800 shrink-0"></div>
            <div class="px-4 py-1.5 border-b border-zinc-100 dark:border-zinc-900 flex items-center gap-2 shrink-0">
                <div class="w-1.5 h-1.5 rounded-full" :class="running ? 'bg-emerald-500 animate-pulse' : 'bg-zinc-300 dark:bg-zinc-700'"></div>
                <span class="text-[10px] text-zinc-400 uppercase tracking-widest">Log</span>
            </div>
            <div x-ref="logs" class="flex-1 overflow-y-auto px-4 py-2 space-y-0.5">
                <template x-for="line in logLines" :key="line">
                    <div class="text-[11px] text-zinc-500 leading-5" x-text="line"></div>
                </template>
                <div x-show="logLines.length === 0" class="text-[11px] text-zinc-300 dark:text-zinc-700">No activity yet.</div>
            </div>
        </div>
    </div>

    <div x-show="tab === 'config'" x-cloak class="flex-1 overflow-y-auto">
        <div class="p-4 sm:p-8 max-w-lg">
            <h1 class="text-sm font-bold mb-6">Settings</h1>
            <div class="space-y-5">
                <div>
                    <label for="cfg-terms" class="block text-[10px] uppercase tracking-wider text-zinc-400 mb-1.5">Search Terms</label>
                    <input id="cfg-terms" type="text" x-model="config.search_terms" placeholder="e.g. Plumbers, Dentists" class="input">
                    <p class="text-[10px] text-zinc-400 mt-1">Comma-separated list of business types.</p>
                </div>
                <div>
                    <label for="cfg-locations" class="block text-[10px] uppercase tracking-wider text-zinc-400 mb-1.5">Locations</label>
                    <input id="cfg-locations" type="text" x-model="config.locations" placeholder="e.g. New York, London" class="input">
                    <p class="text-[10px] text-zinc-400 mt-1">Comma-separated list of cities or areas.</p>
                </div>
                <div>
                    <label for="cfg-max" class="block text-[10px] uppercase tracking-wider text-zinc-400 mb-1.5">Max Results</label>
                    <input id="cfg-max" type="number" x-model="config.max_results" placeholder="0" class="input">
                    <p class="text-[10px] text-zinc-400 mt-1">Set to 0 for unlimited.</p>
                </div>
                <div class="flex items-center justify-between py-3 border-t border-b border-zinc-100 dark:border-zinc-900">
                    <div>
                        <p class="text-xs font-medium">Headless Mode</p>
                        <p class="text-[10px] text-zinc-400 mt-0.5">Hide the browser window while scraping.</p>
                    </div>
                    <button @click="config.headless = !config.headless" role="switch" :aria-checked="config.headless"
                        :class="config.headless ? 'bg-zinc-900 dark:bg-zinc-100' : 'bg-zinc-200 dark:bg-zinc-800'"
                        class="w-10 h-5 rounded-full relative shrink-0">
                        <div :class="config.headless ? 'translate-x-5' : 'translate-x-0.5'" class="w-4 h-4 bg-white rounded-full absolute top-0.5 transition-transform"></div>
                    </button>
                </div>
                <button @click="saveConfig()" class="px-4 py-2 text-xs font-medium bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 rounded hover:opacity-80">Save Settings</button>
            </div>
        </div>
    </div>

</div>

<div class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
    <template x-for="t in $store.toasts.list" :key="t.id">
        <div x-show="t.visible" x-transition
            :class="t.type === 'error' ? 'border-red-200 dark:border-red-800 text-red-600' : 'border-zinc-200 dark:border-zinc-800 text-zinc-700 dark:text-zinc-300'"
            class="pointer-events-auto px-4 py-3 rounded border text-xs font-medium shadow-sm bg-white dark:bg-zinc-900"
            x-text="t.msg"></div>
    </template>
</div>

<script>
function app() {
    return {
        tab: 'dashboard', running: false, leads: [], logLines: [], search: '',
        showClearConfirm: false, sidebarOpen: false, isMobile: window.innerWidth < 768,
        logHeight: 144, config: {}, _pollFails: 0,

        init() {
            Alpine.store('toasts', {
                list: [], _id: 0,
                show(msg, type = 'info', ms = 3000) {
                    const t = { id: ++this._id, msg, type, visible: true };
                    this.list.push(t);
                    setTimeout(() => { t.visible = false; setTimeout(() => this.list.splice(this.list.indexOf(t), 1), 200); }, ms);
                }
            });
            window.addEventListener('resize', () => {
                this.isMobile = window.innerWidth < 768;
                if (!this.isMobile) this.sidebarOpen = true;
            }, { passive: true });
            if (!this.isMobile) this.sidebarOpen = true;
            this.poll().then(() => this._schedule());
        },

        _schedule() {
            const delay = this._pollFails > 3 ? 15000 : (this.running ? 2000 : 6000);
            setTimeout(async () => { await this.poll(); this._schedule(); }, delay);
        },

        async poll() {
            try {
                const d = await fetch('/api/status').then(r => r.json());
                Object.assign(this, { running: d.running, leads: d.leads, logLines: d.logs, config: d.config });
                this._pollFails = 0;
                this.$nextTick(() => { const el = this.$refs.logs; if (el) el.scrollTop = el.scrollHeight; });
            } catch { if (++this._pollFails === 3) Alpine.store('toasts').show('Connection lost. Retrying...', 'error'); }
        },

        async control(action) { await fetch(`/control/${action}`, { method: 'POST' }); await this.poll(); },

        async exportCsv() {
            const res = await fetch('/download');
            if (!res.ok) { Alpine.store('toasts').show('No data to export yet.', 'error'); return; }
            const a = document.createElement('a');
            a.href = URL.createObjectURL(await res.blob()); a.download = 'contacts.csv';
            a.click(); URL.revokeObjectURL(a.href);
            Alpine.store('toasts').show('CSV downloaded.');
        },

        async saveConfig() {
            await fetch('/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(this.config) });
            Alpine.store('toasts').show('Settings saved.');
        },

        startResize(e) {
            const startY = e.touches?.[0]?.clientY ?? e.clientY, startH = this.logHeight;
            const clamp = h => Math.max(60, Math.min(window.innerHeight * 0.7, h));
            const getY = e => e.touches ? e.touches[0].clientY : e.clientY;
            const onMove = e => this.logHeight = clamp(startH - (getY(e) - startY));
            const onUp = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', onUp); document.body.style.cursor = document.body.style.userSelect = ''; };
            if (e.touches) { window.addEventListener('touchmove', onMove, { passive: true }); window.addEventListener('touchend', onUp); }
            else { document.body.style.cursor = 'ns-resize'; document.body.style.userSelect = 'none'; window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp); }
        },

        get filteredLeads() {
            if (!this.search) return this.leads;
            const q = this.search.toLowerCase();
            return this.leads.filter(l => Object.values(l).some(v => String(v).toLowerCase().includes(q)));
        }
    };
}
</script>
</body>
</html>
